{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-heart-pulse-fill"></i> Blood Request Form</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Submit this form to request blood for a patient. Ensure all details are accurate.</p>
                <form action="{{ url_for('requests.public_request') }}" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Patient Name</label>
                            <input type="text" class="form-control" name="patient_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Blood Type Required</label>
                            <select name="blood_type" class="form-select" required>
                                <option value="" disabled selected>Select Blood Type</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Units Required</label>
                            <input type="number" class="form-control" name="units_required" min="1" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Urgency Level</label>
                            <select name="urgency" class="form-select" required>
                                <option value="Normal">Normal</option>
                                <option value="Urgent">Urgent (Within 24h)</option>
                                <option value="Critical">Critical (Immediate)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Select Hospital</label>
                        <select name="hospital_id" class="form-select" required>
                            <option value="" disabled selected>Select registered hospital...</option>
                            {% for h in hospitals %}
                            <option value="{{ h.id }}">{{ h.name }} ({{ h.city }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Submit Request</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
