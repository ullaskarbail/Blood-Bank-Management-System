{% extends 'layout.html' %}

{% block content %}
<h2>Login</h2>
<form action="/login" method="post">
    <div>
        <label>Email / Username:</label>
        <input type="text" name="email" required>
    </div>
    <div>
        <label>Password:</label>
        <input type="password" name="password" required>
    </div>
    <button type="submit">Login</button>
</form>
{% endblock %}
